name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build linux/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o xraya-linux-${{ matrix.arch }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xraya-linux-${{ matrix.arch }}
          path: xraya-linux-${{ matrix.arch }}
          retention-days: 7

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download amd64
        uses: actions/download-artifact@v4
        with:
          name: xraya-linux-amd64

      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: xraya-linux-arm64

      - name: Checksums
        run: sha256sum xraya-linux-amd64 xraya-linux-arm64 > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: XrayA
          files: |
            xraya-linux-amd64
            xraya-linux-arm64
            sha256sums.txt
          generate_release_notes: true
